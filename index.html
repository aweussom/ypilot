<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YPilot</title>
  <!-- Favicon: rakett-emoji 🚀 som inline base64-SVG (ingen ekstra fil) -->
  <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHRleHQgeD0iNTAlIiB5PSI1NCIgZm9udC1zaXplPSI1NCIgdGV4dC1hbmNob3I9Im1pZGRsZSI+8J+agDwvdGV4dD48L3N2Zz4=">

  <!-- Phaser 4 fra CDN — ingen bundler, dobbeltklikk og kjør -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>
  <style>
    /* Mørk bakgrunn — neon-estetikken lever av kontrast */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #05060a;
      overflow: hidden;
      font-family: "Courier New", monospace;
    }
    #game {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* HUD ligger i DOM over canvas — ingen HUD-forurensning av spill-lerretet */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 10px 18px;
      pointer-events: none;
      user-select: none;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 0 8px currentColor;
    }
    #hud .p1 { color: #00ffff; }   /* cyan  — spiller 1 */
    #hud .p2 { color: #ff00ff; }   /* magenta — spiller 2 */
    #hud .hint {
      color: #4488ff;
      opacity: 0.6;
      font-weight: normal;
      letter-spacing: 1px;
      font-size: 12px;
      align-self: center;
    }
    #hud .player { display: flex; flex-direction: column; gap: 4px; }
    #hud .p2 { align-items: flex-end; }
    #hud .fuelbar {
      width: 130px; height: 7px;
      border: 1px solid currentColor; border-radius: 3px; overflow: hidden;
      box-shadow: 0 0 6px currentColor;
    }
    #hud .fuelbar span { display: block; height: 100%; width: 100%; background: currentColor; }
    #hud .lives { font-size: 15px; letter-spacing: 3px; }
    #hud .hint { display: flex; flex-direction: column; }
    #hud #remaining { color: #cfe3ff; opacity: 0.8; margin-top: 4px; }
    /* Game-over-overlay */
    #gameover {
      position: absolute; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; pointer-events: none; user-select: none;
    }
    #gameover #gameover-text {
      font-size: 64px; font-weight: bold; letter-spacing: 4px;
      color: #fff; text-shadow: 0 0 20px #4488ff, 0 0 40px #4488ff;
    }
    #gameover .sub { font-size: 16px; color: #4488ff; letter-spacing: 2px; }
    /* Innstillinger — egen DOM-rad nederst (pointer-events på, i motsetning til #hud) */
    #settings {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px;
      font-size: 12px;
      letter-spacing: 1px;
      color: #4488ff;
      background: rgba(5, 6, 10, 0.6);
      border: 1px solid rgba(68, 136, 255, 0.35);
      border-radius: 4px;
      user-select: none;
    }
    #settings input[type=range] { accent-color: #4488ff; cursor: pointer; width: 160px; }
    #settings #grav-val { color: #00ffff; min-width: 3.4em; text-align: right; }
    #settings select {
      background: #0a0e1a;
      color: #00ffff;
      border: 1px solid rgba(68, 136, 255, 0.5);
      border-radius: 3px;
      font-family: inherit;
      font-size: 12px;
      padding: 2px 4px;
      max-width: 240px;
      cursor: pointer;
    }
    #settings .sep { color: rgba(68, 136, 255, 0.4); }
    /* Mus-styring-hint — diskret linje over bunnlinja, vises kun i mus-modus */
    #control-hint {
      position: absolute; bottom: 44px; left: 50%; transform: translateX(-50%);
      display: none; padding: 4px 12px; font-size: 12px; letter-spacing: 1px;
      color: #00ffff; background: rgba(5, 6, 10, 0.6);
      border: 1px solid rgba(68, 136, 255, 0.35); border-radius: 4px;
      text-shadow: 0 0 6px currentColor; pointer-events: none; user-select: none;
    }
    /* Tuning-panel — egen overlay til høyre. Faner + live-sliders + eksport. */
    #tuning {
      position: absolute; top: 84px; right: 10px; width: 226px;
      max-height: calc(100vh - 150px); overflow-y: auto;
      background: rgba(5, 6, 10, 0.78);
      border: 1px solid rgba(68, 136, 255, 0.35); border-radius: 6px;
      padding: 8px 10px; font-size: 11px; color: #4488ff; letter-spacing: 0.5px;
      user-select: none; z-index: 6;
    }
    #tuning .t-title { color: #00ffff; font-weight: bold; letter-spacing: 1px; margin-bottom: 6px; }
    #tuning .t-tabs { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 6px; }
    #tuning .t-tab {
      background: #0a0e1a; color: #4488ff; border: 1px solid rgba(68, 136, 255, 0.4);
      border-radius: 3px; font-family: inherit; font-size: 10px; padding: 2px 6px; cursor: pointer;
    }
    #tuning .t-tab.active { color: #00ffff; border-color: #00ffff; background: #0c1430; }
    #tuning .t-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
    #tuning .t-name { flex: 0 0 78px; }
    #tuning .t-row input[type=range] { flex: 1; width: auto; min-width: 0; accent-color: #4488ff; cursor: pointer; }
    #tuning .t-val { flex: 0 0 40px; text-align: right; color: #00ffff; }
    #tuning .t-export {
      margin-top: 8px; width: 100%; background: #0a0e1a; color: #00ffff;
      border: 1px solid rgba(68, 136, 255, 0.5); border-radius: 3px; padding: 5px;
      font-family: inherit; cursor: pointer;
    }
    /* Eksport-popup */
    #export-modal {
      position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.6); z-index: 30;
    }
    #export-modal .em-box {
      background: #0a0e1a; border: 1px solid #4488ff; border-radius: 6px; padding: 14px;
      width: 420px; max-width: 90vw; display: flex; flex-direction: column; gap: 8px;
      color: #4488ff; font-size: 12px;
    }
    #export-modal .em-title { color: #00ffff; }
    #export-modal .em-text {
      width: 100%; height: 260px; background: #05060a; color: #cfe3ff;
      border: 1px solid rgba(68, 136, 255, 0.4); font-family: monospace; font-size: 11px; resize: none;
    }
    #export-modal .em-close {
      align-self: flex-end; background: #0a0e1a; color: #00ffff;
      border: 1px solid rgba(68, 136, 255, 0.5); border-radius: 3px; padding: 4px 12px; cursor: pointer;
    }
</style>
</head>
<body>
  <div id="game"></div>
  <div id="hud">
    <div class="player p1">
      <div id="score-p1">P1  0</div>
      <div class="fuelbar"><span id="fuel-p1"></span></div>
      <div class="lives" id="lives-p1">&#9829;&#9829;&#9829;</div>
    </div>
    <div class="hint">
      <div>P1: A/S sving · Shift gass · Return skyt · Space skjold &nbsp;&nbsp; P2: &larr;&rarr; sving · &uarr; gass · / skyt · &darr; skjold</div>
      <div id="remaining"></div>
    </div>
    <div class="player p2">
      <div id="score-p2">P2  0</div>
      <div class="fuelbar"><span id="fuel-p2"></span></div>
      <div class="lives" id="lives-p2">&#9829;&#9829;&#9829;</div>
    </div>
  </div>
  <div id="gameover">
    <div id="gameover-text"></div>
    <div class="sub">Trykk R for ny runde</div>
  </div>
  <!-- Mus-styring: hint nederst-midt (vises kun når Styring=Mus). Toggles av updateControlHint. -->
  <div id="control-hint"></div>
  <div id="settings">
    <label for="map-select">Kart</label>
    <select id="map-select"></select>
    <span class="sep">·</span>
    <label for="grav">Gravitasjon</label>
    <input id="grav" type="range" min="0" max="0.1" step="0.002" value="0" autocomplete="off">
    <span id="grav-val">0.000</span>
    <span class="sep">·</span>
    <label class="ai"><input type="checkbox" id="ai-toggle" autocomplete="off"> Bots!</label>
    <span class="sep">·</span>
    <label class="ai"><input type="checkbox" id="newbie-toggle" autocomplete="off"> Newbie</label>
    <span class="sep">·</span>
    <label class="ai"><input type="checkbox" id="radar-toggle" autocomplete="off"> Radar</label>
    <span class="sep">·</span>
    <label for="control-select">Styring</label>
    <select id="control-select">
      <option value="tastatur">Tastatur</option>
      <option value="mus">Mus</option>
      <option value="kontroller">Kontroller</option>
    </select>
    <span class="sep">·</span>
    <label for="mode-select">Fysikk</label>
    <select id="mode-select">
      <option value="xpilot">XPilot</option>
      <option value="trii">TR-II</option>
    </select>
    <span class="sep">·</span>
    <label for="botlevel-select">Bot</label>
    <select id="botlevel-select">
      <option value="enkel">Enkel</option>
      <option value="vanskelig">Vanskelig</option>
      <option value="nordlending">Nordlending</option>
    </select>
    <span class="sep">·</span>
    <label for="look-select">Look</label>
    <select id="look-select">
      <option value="new">New</option>
      <option value="trad">Trad</option>
    </select>
  </div>
  <div id="tuning"></div>
  <script src="maps-embedded.js"></script>
  <script src="game.js"></script>
</body>
</html>
